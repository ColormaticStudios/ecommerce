components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: session_token
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
        code:
          type: string

    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    DraftPreviewSessionResponse:
      type: object
      required: [active]
      properties:
        active:
          type: boolean
        expires_at:
          type: string
          format: date-time
          nullable: true

    Pagination:
      type: object
      required: [page, limit, total, total_pages]
      properties:
        page:
          type: integer
          minimum: 1
        limit:
          type: integer
          minimum: 1
        total:
          type: integer
          minimum: 0
        total_pages:
          type: integer
          minimum: 0

    User:
      type: object
      required:
        - id
        - subject
        - username
        - email
        - name
        - profile_photo_url
        - role
        - currency
        - created_at
        - updated_at
      properties:
        id:
          type: integer
          minimum: 1
        subject:
          type: string
        username:
          type: string
        email:
          type: string
        name:
          type: string
          nullable: true
        profile_photo_url:
          type: string
          nullable: true
        role:
          type: string
          enum: [admin, customer]
        currency:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        deleted_at:
          type: string
          format: date-time
          nullable: true

    RegisterRequest:
      type: object
      required: [username, email, password]
      properties:
        username:
          type: string
          minLength: 3
        email:
          type: string
        password:
          type: string
          minLength: 6
        name:
          type: string

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    AuthResponse:
      type: object
      required: [user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    AuthConfigResponse:
      type: object
      required: [local_sign_in_enabled, oidc_enabled]
      properties:
        local_sign_in_enabled:
          type: boolean
        oidc_enabled:
          type: boolean

    UpdateProfileRequest:
      type: object
      properties:
        name:
          type: string
        currency:
          type: string
          minLength: 3
          maxLength: 3
        profile_photo_url:
          type: string

    Brand:
      type: object
      required:
        - id
        - name
        - slug
        - is_active
      properties:
        id:
          type: integer
          minimum: 1
        name:
          type: string
        slug:
          type: string
        description:
          type: string
          nullable: true
        logo_media_id:
          type: string
          nullable: true
        is_active:
          type: boolean

    BrandListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Brand"

    BrandInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 120
        slug:
          type: string
          nullable: true
          maxLength: 120
        description:
          type: string
          nullable: true
          maxLength: 500
        logo_media_id:
          type: string
          nullable: true
        is_active:
          type: boolean

    ProductAttributeDefinition:
      type: object
      required: [id, key, slug, type, filterable, sortable]
      properties:
        id:
          type: integer
          minimum: 1
        key:
          type: string
        slug:
          type: string
        type:
          type: string
          enum: [text, number, boolean, enum]
        filterable:
          type: boolean
        sortable:
          type: boolean

    ProductAttributeDefinitionInput:
      type: object
      required: [key, type]
      properties:
        key:
          type: string
          minLength: 2
          maxLength: 120
        slug:
          type: string
          nullable: true
          maxLength: 120
        type:
          type: string
          enum: [text, number, boolean, enum]
        filterable:
          type: boolean
        sortable:
          type: boolean

    ProductAttributeDefinitionListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ProductAttributeDefinition"

    ProductOptionValue:
      type: object
      required:
        - value
        - position
      properties:
        id:
          type: integer
          minimum: 1
        value:
          type: string
        position:
          type: integer
          minimum: 1

    ProductOption:
      type: object
      required:
        - name
        - position
        - display_type
        - values
      properties:
        id:
          type: integer
          minimum: 1
        name:
          type: string
        position:
          type: integer
          minimum: 1
        display_type:
          type: string
        values:
          type: array
          items:
            $ref: "#/components/schemas/ProductOptionValue"

    ProductVariantSelection:
      type: object
      required:
        - option_name
        - option_value
        - position
      properties:
        product_option_value_id:
          type: integer
          minimum: 1
        option_name:
          type: string
        option_value:
          type: string
        position:
          type: integer
          minimum: 1

    ProductVariant:
      type: object
      required:
        - sku
        - title
        - price
        - stock
        - position
        - is_published
        - selections
      properties:
        id:
          type: integer
          minimum: 1
        sku:
          type: string
        title:
          type: string
        price:
          type: number
          format: double
        compare_at_price:
          type: number
          format: double
          nullable: true
        stock:
          type: integer
          minimum: 0
        position:
          type: integer
          minimum: 1
        is_published:
          type: boolean
        weight_grams:
          type: integer
          nullable: true
        length_cm:
          type: number
          format: double
          nullable: true
        width_cm:
          type: number
          format: double
          nullable: true
        height_cm:
          type: number
          format: double
          nullable: true
        selections:
          type: array
          items:
            $ref: "#/components/schemas/ProductVariantSelection"

    ProductAttributeValue:
      type: object
      required:
        - product_attribute_id
        - key
        - slug
        - type
        - position
      properties:
        product_attribute_id:
          type: integer
          minimum: 1
        key:
          type: string
        slug:
          type: string
        type:
          type: string
        text_value:
          type: string
          nullable: true
        number_value:
          type: number
          format: double
          nullable: true
        boolean_value:
          type: boolean
          nullable: true
        enum_value:
          type: string
          nullable: true
        position:
          type: integer
          minimum: 1

    ProductSEO:
      type: object
      properties:
        title:
          type: string
          nullable: true
          maxLength: 70
        description:
          type: string
          nullable: true
          maxLength: 160
        canonical_path:
          type: string
          nullable: true
          maxLength: 255
        og_image_media_id:
          type: string
          nullable: true
        noindex:
          type: boolean

    ProductPriceRange:
      type: object
      required:
        - min
        - max
      properties:
        min:
          type: number
          format: double
        max:
          type: number
          format: double

    Product:
      type: object
      required:
        - id
        - sku
        - name
        - description
        - price
        - stock
        - images
        - related_products
        - options
        - variants
        - attributes
        - seo
        - price_range
        - created_at
        - updated_at
      properties:
        id:
          type: integer
          minimum: 1
        sku:
          type: string
        name:
          type: string
        subtitle:
          type: string
          nullable: true
        description:
          type: string
        price:
          type: number
          format: double
        stock:
          type: integer
          minimum: 0
        images:
          type: array
          items:
            type: string
        cover_image:
          type: string
          nullable: true
        brand:
          $ref: "#/components/schemas/Brand"
        default_variant_id:
          type: integer
          minimum: 1
          nullable: true
        default_variant_sku:
          type: string
          nullable: true
        price_range:
          $ref: "#/components/schemas/ProductPriceRange"
        options:
          type: array
          items:
            $ref: "#/components/schemas/ProductOption"
        variants:
          type: array
          items:
            $ref: "#/components/schemas/ProductVariant"
        attributes:
          type: array
          items:
            $ref: "#/components/schemas/ProductAttributeValue"
        seo:
          $ref: "#/components/schemas/ProductSEO"
        related_products:
          type: array
          items:
            $ref: "#/components/schemas/RelatedProduct"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        deleted_at:
          type: string
          format: date-time
          nullable: true
        is_published:
          type: boolean
        has_draft_changes:
          type: boolean
