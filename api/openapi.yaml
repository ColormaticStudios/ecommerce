openapi: 3.0.3
info:
  title: Ecommerce API
  version: 0.2.0
  description: API contract for backend and frontend type generation.
servers:
  - url: http://localhost:3000
security:
  - cookieAuth: []
  - bearerAuth: []
tags:
  - name: auth
  - name: products
  - name: profile
  - name: cart
  - name: checkout
  - name: orders
  - name: admin
  - name: media
  - name: storefront
  - name: website
paths:
  /api/v1/auth/register:
    post:
      tags: [auth]
      operationId: register
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/auth/login:
    post:
      tags: [auth]
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/auth/logout:
    post:
      tags: [auth]
      operationId: logout
      security: []
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /api/v1/auth/config:
    get:
      tags: [auth]
      operationId: getAuthConfig
      security: []
      responses:
        "200":
          description: Authentication configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthConfigResponse"

  /api/v1/auth/oidc/login:
    get:
      tags: [auth]
      operationId: oidcLogin
      security: []
      parameters:
        - in: query
          name: redirect
          schema:
            type: string
        - in: query
          name: response_format
          schema:
            type: string
            enum: [json]
      responses:
        "302":
          description: Redirect to provider

  /api/v1/auth/oidc/callback:
    get:
      tags: [auth]
      operationId: oidcCallback
      security: []
      parameters:
        - in: query
          name: code
          schema:
            type: string
        - in: query
          name: state
          schema:
            type: string
        - in: query
          name: format
          schema:
            type: string
            enum: [json]
      responses:
        "200":
          description: Callback as JSON
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "302":
          description: Callback as redirect
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/products:
    get:
      tags: [products]
      operationId: listProducts
      security: []
      summary: List products
      parameters:
        - in: query
          name: q
          schema:
            type: string
        - in: query
          name: min_price
          schema:
            type: number
            format: double
        - in: query
          name: max_price
          schema:
            type: number
            format: double
        - in: query
          name: brand_slug
          schema:
            type: string
        - in: query
          name: has_variant_stock
          schema:
            type: boolean
        - in: query
          name: attribute
          style: deepObject
          explode: true
          schema:
            type: object
            additionalProperties:
              type: string
        - in: query
          name: sort
          schema:
            type: string
            enum: [price, name, created_at]
        - in: query
          name: order
          schema:
            type: string
            enum: [asc, desc]
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Paginated products
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductPage"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/brands:
    get:
      tags: [products]
      operationId: listBrands
      security: []
      summary: List active storefront brands
      responses:
        "200":
          description: Active brands
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BrandListResponse"

  /api/v1/product-attributes:
    get:
      tags: [products]
      operationId: listProductAttributes
      security: []
      summary: List storefront product attributes
      responses:
        "200":
          description: Filterable product attribute definitions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductAttributeDefinitionListResponse"

  /api/v1/products/{id}:
    get:
      tags: [products]
      operationId: getProduct
      security: []
      summary: Get product by id
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/storefront:
    get:
      tags: [storefront]
      operationId: getStorefrontSettings
      security: []
      responses:
        "200":
          description: Storefront settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StorefrontSettingsResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/me/:
    get:
      tags: [profile]
      operationId: getProfile
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      tags: [profile]
      operationId: updateProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileRequest"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/me/profile-photo:
    post:
      tags: [media]
      operationId: setProfilePhoto
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [media_id]
              properties:
                media_id:
                  type: string
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "413":
          description: Too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      tags: [media]
      operationId: deleteProfilePhoto
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /api/v1/me/payment-methods:
    get:
      tags: [profile]
      operationId: listSavedPaymentMethods
      responses:
        "200":
          description: Saved payment methods
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SavedPaymentMethod"
    post:
      tags: [profile]
      operationId: createSavedPaymentMethod
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSavedPaymentMethodRequest"
      responses:
        "201":
          description: Created payment method
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedPaymentMethod"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/me/payment-methods/{id}:
    delete:
      tags: [profile]
      operationId: deleteSavedPaymentMethod
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/me/payment-methods/{id}/default:
    patch:
      tags: [profile]
      operationId: setDefaultPaymentMethod
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: Updated payment method
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedPaymentMethod"

  /api/v1/me/addresses:
    get:
      tags: [profile]
      operationId: listSavedAddresses
      responses:
        "200":
          description: Saved addresses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SavedAddress"
    post:
      tags: [profile]
      operationId: createSavedAddress
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSavedAddressRequest"
      responses:
        "201":
          description: Created address
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedAddress"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/me/addresses/{id}:
    delete:
      tags: [profile]
      operationId: deleteSavedAddress
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/me/addresses/{id}/default:
    patch:
      tags: [profile]
      operationId: setDefaultAddress
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: Updated address
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedAddress"

  /api/v1/me/cart:
    get:
      tags: [cart]
      operationId: getCart
      responses:
        "200":
          description: Cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
    post:
      tags: [cart]
      operationId: addCartItem
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddCartItemRequest"
      responses:
        "200":
          description: Cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"

  /api/v1/checkout/cart:
    get:
      tags: [checkout]
      operationId: getCheckoutCart
      responses:
        "200":
          description: Cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
        "403":
          description: Guest checkout disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/checkout/cart/summary:
    get:
      tags: [checkout]
      operationId: getCheckoutCartSummary
      responses:
        "200":
          description: Cart summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutCartSummary"
        "403":
          description: Guest checkout disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/checkout/cart/items:
    post:
      tags: [checkout]
      operationId: addCheckoutCartItem
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddCartItemRequest"
      responses:
        "200":
          description: Cart
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Cart"
        "403":
          description: Guest checkout disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/checkout/cart/items/{itemId}:
    patch:
      tags: [checkout]
      operationId: updateCheckoutCartItem
      parameters:
        - in: path
          name: itemId
          required: true
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCartItemRequest"
      responses:
        "200":
          description: Updated item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartItem"
        "403":
          description: Guest checkout disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      tags: [checkout]
      operationId: deleteCheckoutCartItem
      parameters:
        - in: path
          name: itemId
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "403":
          description: Guest checkout disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/me/cart/{itemId}:
    patch:
      tags: [cart]
      operationId: updateCartItem
      parameters:
        - in: path
          name: itemId
          required: true
          schema:
            type: integer
            minimum: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCartItemRequest"
      responses:
        "200":
          description: Updated item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CartItem"
    delete:
      tags: [cart]
      operationId: deleteCartItem
      parameters:
        - in: path
          name: itemId
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /api/v1/me/checkout/plugins:
    get:
      tags: [checkout]
      operationId: listCheckoutPlugins
      responses:
        "200":
          description: Available checkout provider plugins
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutPluginCatalog"

  /api/v1/checkout/plugins:
    get:
      tags: [checkout]
      operationId: listCheckoutSessionPlugins
      responses:
        "200":
          description: Available checkout provider plugins
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutPluginCatalog"
        "403":
          description: Guest checkout disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/me/checkout/quote:
    post:
      tags: [checkout]
      operationId: quoteCheckout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutQuoteRequest"
      responses:
        "200":
          description: Quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutQuoteResponse"
        "400":
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/checkout/quote:
    post:
      tags: [checkout]
      operationId: quoteCheckoutSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutQuoteRequest"
      responses:
        "200":
          description: Quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutQuoteResponse"
        "400":
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Guest checkout disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/checkout/orders:
    post:
      tags: [checkout, orders]
      operationId: createCheckoutOrder
      parameters:
        - in: header
          name: Idempotency-Key
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCheckoutOrderRequest"
      responses:
        "201":
          description: Created order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Guest checkout disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Idempotency conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          description: Checkout submission rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/checkout/orders/{id}/payments/authorize:
    post:
      tags: [checkout, orders]
      operationId: authorizeCheckoutOrderPayment
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            minimum: 1
        - in: header
          name: Idempotency-Key
          required: false
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthorizeCheckoutOrderPaymentRequest"
      responses:
        "200":
          description: Payment result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcessPaymentResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Guest checkout disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Idempotency conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          description: Checkout submission rate limited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/checkout/orders/{id}/shipping/rates:
    post:
      tags: [checkout, orders]
      operationId: quoteCheckoutOrderShippingRates
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            minimum: 1
        - in: header
          name: Idempotency-Key
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutOrderShippingRatesRequest"
      responses:
        "200":
          description: Persisted shipping rates for the checkout snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutOrderShippingRatesResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Snapshot mismatch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/checkout/orders/{id}/shipping/tracking:
    get:
      tags: [checkout, orders]
      operationId: getCheckoutOrderShippingTracking
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: Shipment tracking timeline for the order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutOrderTrackingResponse"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/checkout/orders/{id}/tax/finalize:
    post:
      tags: [checkout, orders]
      operationId: finalizeCheckoutOrderTax
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
            minimum: 1
        - in: header
          name: Idempotency-Key
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckoutOrderTaxFinalizeRequest"
      responses:
        "200":
          description: Tax finalization result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutOrderTaxFinalizeResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Snapshot mismatch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/v1/me/orders:
    get:
      tags: [orders]
      operationId: listUserOrders
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum:
              [PENDING, PAID, FAILED, SHIPPED, DELIVERED, CANCELLED, REFUNDED]
        - in: query
          name: start_date
          schema:
            type: string
        - in: query
          name: end_date
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Orders page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderPage"
    post:
      tags: [orders]
      operationId: createOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderRequest"
      responses:
        "201":
          description: Created order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /api/v1/me/orders/claim:
    post:
      tags: [orders]
      operationId: claimGuestOrder
      requestBody:
