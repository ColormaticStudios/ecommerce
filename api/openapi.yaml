components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: session_token
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
        code:
          type: string

    MessageResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    CmsEntryStatus:
      type: string
      enum: [DRAFT, SCHEDULED, PUBLISHED, ARCHIVED]

    CmsEntry:
      type: object
      required: [id, entry_type, key, status, created_at, updated_at]
      properties:
        id:
          type: integer
          minimum: 1
        entry_type:
          type: string
          enum: [page, layout, global, navigation, template]
        key:
          type: string
        status:
          $ref: "#/components/schemas/CmsEntryStatus"
        current_version_id:
          type: integer
          nullable: true
        published_version_id:
          type: integer
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CmsEntryVersion:
      type: object
      required: [id, entry_id, version_number, schema_version, payload, created_at]
      properties:
        id:
          type: integer
          minimum: 1
        entry_id:
          type: integer
          minimum: 1
        version_number:
          type: integer
          minimum: 1
        schema_version:
          type: integer
          minimum: 1
        payload:
          $ref: "#/components/schemas/CmsPagePayload"
        created_by:
          type: integer
          nullable: true
        change_summary:
          type: string
        created_at:
          type: string
          format: date-time

    CmsPublication:
      type: object
      required: [id, entry_id, version_id, published_at]
      properties:
        id:
          type: integer
          minimum: 1
        entry_id:
          type: integer
          minimum: 1
        version_id:
          type: integer
          minimum: 1
        published_by:
          type: integer
          nullable: true
        published_at:
          type: string
          format: date-time
        rollback_from_publication_id:
          type: integer
          nullable: true
        notes:
          type: string

    CmsNavigationMenu:
      type: object
      required: [id, entry_id, key, title, location, created_at, updated_at]
      properties:
        id:
          type: integer
          minimum: 1
        entry_id:
          type: integer
          minimum: 1
        key:
          type: string
        title:
          type: string
        location:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CmsNavigationItem:
      type: object
      required: [id, menu_id, label, item_type, target_ref, url, sort_order, is_enabled]
      properties:
        id:
          type: integer
          minimum: 0
        menu_id:
          type: integer
          minimum: 0
        parent_id:
          type: integer
          nullable: true
        label:
          type: string
        item_type:
          type: string
          enum: [internal, external, category, product, page, dropdown]
        target_ref:
          type: string
        url:
          type: string
        sort_order:
          type: integer
        is_enabled:
          type: boolean

    CmsNavigationDraftRequest:
      type: object
      required: [key, title, location, items]
      properties:
        key:
          type: string
        title:
          type: string
        location:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/CmsNavigationItemInput"
        change_summary:
          type: string

    CmsNavigationItemInput:
      type: object
      required: [label, item_type, target_ref, url, sort_order, is_enabled]
      properties:
        id:
          type: integer
          minimum: 0
        parent_id:
          type: integer
          nullable: true
        label:
          type: string
        item_type:
          type: string
          enum: [internal, external, category, product, page, dropdown]
        target_ref:
          type: string
        url:
          type: string
        sort_order:
          type: integer
        is_enabled:
          type: boolean

    CmsNavigationResponse:
      type: object
      required: [menu, entry, items, has_unpublished_draft]
      properties:
        menu:
          $ref: "#/components/schemas/CmsNavigationMenu"
        entry:
          $ref: "#/components/schemas/CmsEntry"
        items:
          type: array
          items:
            $ref: "#/components/schemas/CmsNavigationItem"
        current_version:
          nullable: true
          $ref: "#/components/schemas/CmsEntryVersion"
        published_version:
          nullable: true
          $ref: "#/components/schemas/CmsEntryVersion"
        latest_publication:
          nullable: true
          $ref: "#/components/schemas/CmsPublication"
        has_unpublished_draft:
          type: boolean

    CmsNavigationListResponse:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/CmsNavigationResponse"
        pagination:
          $ref: "#/components/schemas/Pagination"

    CmsGlobalRegion:
      type: object
      required: [id, entry_id, key, title, region, created_at, updated_at]
      properties:
        id:
          type: integer
          minimum: 1
        entry_id:
          type: integer
          minimum: 1
        key:
          type: string
        title:
          type: string
        region:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CmsGlobalRegionDraftRequest:
      type: object
      required: [key, title, region, payload]
      properties:
        key:
          type: string
        title:
          type: string
        region:
          type: string
        payload:
          $ref: "#/components/schemas/CmsPagePayload"
        change_summary:
          type: string

    CmsGlobalRegionResponse:
      type: object
      required: [region, entry, has_unpublished_draft]
      properties:
        region:
          $ref: "#/components/schemas/CmsGlobalRegion"
        entry:
          $ref: "#/components/schemas/CmsEntry"
        current_version:
          nullable: true
          $ref: "#/components/schemas/CmsEntryVersion"
        published_version:
          nullable: true
          $ref: "#/components/schemas/CmsEntryVersion"
        latest_publication:
          nullable: true
          $ref: "#/components/schemas/CmsPublication"
        has_unpublished_draft:
          type: boolean

    CmsGlobalRegionListResponse:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/CmsGlobalRegionResponse"
        pagination:
          $ref: "#/components/schemas/Pagination"

    CmsPage:
      type: object
      required: [id, entry_id, path, slug, title, template_key, visibility, is_homepage, created_at, updated_at]
      properties:
        id:
          type: integer
          minimum: 1
        entry_id:
          type: integer
          minimum: 1
        path:
          type: string
        slug:
          type: string
        title:
          type: string
        template_key:
          type: string
        visibility:
          type: string
          enum: [public, hidden]
        seo_metadata_id:
          type: integer
          nullable: true
        is_homepage:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CmsPageResponse:
      type: object
      required: [page, entry, has_unpublished_draft]
      properties:
        page:
          $ref: "#/components/schemas/CmsPage"
        entry:
          $ref: "#/components/schemas/CmsEntry"
        current_version:
          nullable: true
          $ref: "#/components/schemas/CmsEntryVersion"
        published_version:
          nullable: true
          $ref: "#/components/schemas/CmsEntryVersion"
        latest_publication:
          nullable: true
          $ref: "#/components/schemas/CmsPublication"
        has_unpublished_draft:
          type: boolean
        delivery:
          $ref: "#/components/schemas/CmsDeliveryDecision"
        seo:
          $ref: "#/components/schemas/CmsSEOMetadata"
        localization:
          $ref: "#/components/schemas/CmsResolvedLocalization"

    CmsPageListResponse:
      type: object
      required: [data, pagination]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/CmsPageResponse"
        pagination:
          $ref: "#/components/schemas/Pagination"

    CmsPageDraftRequest:
      type: object
      required: [path, title, payload]
      properties:
        path:
          type: string
        slug:
          type: string
        title:
          type: string
        template_key:
          type: string
        visibility:
          type: string
          enum: [public, hidden]
        is_homepage:
          type: boolean
        payload:
          $ref: "#/components/schemas/CmsPagePayload"
        change_summary:
          type: string

    CmsPagePayload:
      type: object
      properties:
        blocks:
          type: array
          items:
            $ref: "#/components/schemas/CmsContentBlock"
      additionalProperties: true

    CmsContentBlock:
      oneOf:
        - $ref: "#/components/schemas/CmsHeroBlock"
        - $ref: "#/components/schemas/CmsRichTextBlock"
        - $ref: "#/components/schemas/CmsImageBlock"
        - $ref: "#/components/schemas/CmsGalleryBlock"
        - $ref: "#/components/schemas/CmsVideoBlock"
        - $ref: "#/components/schemas/CmsFAQBlock"
        - $ref: "#/components/schemas/CmsCTABlock"
        - $ref: "#/components/schemas/CmsPromoBannerBlock"
        - $ref: "#/components/schemas/CmsProductRailBlock"
        - $ref: "#/components/schemas/CmsCategoryTilesBlock"
        - $ref: "#/components/schemas/CmsPromotionHighlightBlock"
        - $ref: "#/components/schemas/CmsInventoryMessageBlock"
        - $ref: "#/components/schemas/CmsTestimonialBlock"
        - $ref: "#/components/schemas/CmsSocialEmbedBlock"
        - $ref: "#/components/schemas/CmsCustomHTMLBlock"
        - $ref: "#/components/schemas/CmsFooterBlock"
      discriminator:
        propertyName: type

    CmsLink:
      type: object
      required: [label, url]
      properties:
        label:
          type: string
        url:
          type: string

    CmsHeroBlock:
      type: object
      required: [type, title]
      properties:
        type:
          type: string
          enum: [hero]
        title:
          type: string
        subtitle:
          type: string
        image_media_id:
          type: string
        primary_cta:
          $ref: "#/components/schemas/CmsLink"

    CmsRichTextBlock:
      type: object
      required: [type, body]
      properties:
        type:
          type: string
          enum: [rich_text]
        body:
          type: string

    CmsImageBlock:
      type: object
      required: [type, media_id]
      properties:
        type:
          type: string
          enum: [image]
        media_id:
          type: string
        alt:
          type: string
        caption:
          type: string

    CmsGalleryBlock:
